<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    color: white;
}

.container {
    margin-top: 15vh;
}

img {
    width: 260px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    50% { transform: translateY(-15px); }
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    position: absolute;
}

#yes { background: #28a745; left: 30%; top: 70%; }
#no { background: #dc3545; left: 55%; top: 70%; }

#secret {
    background: #ff69b4;
    left: 40%;
    top: 80%;
}

#message {
    margin-top: 20px;
    font-size: 22px;
}

.heart {
    position: absolute;
    animation: fall linear infinite;
}

@keyframes fall {
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div class="container">
    <img src="https://i.ibb.co/Tqdc6Kxj/IMG-2818.jpg">

    <h1>Ты соскучилась? ❤️</h1>

    <button id="yes">Да</button>
    <button id="no">Нет</button>
    <button id="secret">А что тут? 🧐❤️</button>

    <div id="message"></div>
</div>

<script>
const noBtn = document.getElementById('no');
const yesBtn = document.getElementById('yes');

noBtn.addEventListener('mouseover', () => {
    noBtn.style.left = Math.random() * 80 + 'vw';
    noBtn.style.top = Math.random() * 80 + 'vh';
});

yesBtn.onclick = () => {
    document.getElementById('message').innerText = "Вот это правильно ❤️";
};

// переход
document.getElementById('secret').onclick = () => {
    window.location.href = "love.html";
};
</script>

</body>
</html>
