<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Анимированный фон */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #ff4d6d, transparent, #6a00ff);
    animation: moveBg 10s linear infinite;
    z-index: 0;
    opacity: 0.4;
}

@keyframes moveBg {
    0% { transform: translate(-25%, -25%) rotate(0deg); }
    100% { transform: translate(-25%, -25%) rotate(360deg); }
}

/* Контейнер */
.menu {
    position: relative;
    z-index: 1;
    text-align: center;
}

/* Заголовок */
h1 {
    color: white;
    font-size: 40px;
    margin-bottom: 40px;
    text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
}

/* Кнопки */
.btn {
    display: block;
    width: 260px;
    margin: 15px auto;
    padding: 15px;
    font-size: 18px;
    color: white;
    background: transparent;
    border: 2px solid #ff4d6d;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
    overflow: hidden;
}

/* Неоновое свечение */
.btn::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff4d6d;
    top: 0;
    left: -100%;
    transition: 0.4s;
    z-index: -1;
}

.btn:hover::before {
    left: 0;
}

.btn:hover {
    box-shadow: 0 0 10px #ff4d6d, 0 0 40px #ff4d6d;
    transform: scale(1.05);
}

/* Разные цвета */
.btn:nth-child(2) { border-color: #ff4d6d; }
.btn:nth-child(3) { border-color: #00f7ff; }
.btn:nth-child(4) { border-color: #aaff00; }

.btn:nth-child(2):hover { box-shadow: 0 0 15px #ff4d6d, 0 0 40px #ff4d6d; }
.btn:nth-child(3):hover { box-shadow: 0 0 15px #00f7ff, 0 0 40px #00f7ff; }
.btn:nth-child(4):hover { box-shadow: 0 0 15px #aaff00, 0 0 40px #aaff00; }
</style>
</head>

<body>

<div class="menu">
    <h1>Для тебя ❤️</h1>

    <button class="btn" onclick="go('love.html')">💌 Секрет</button>
    <button class="btn" onclick="go('gift.html')">🎁 Подарок</button>
    <button class="btn" onclick="go('old.html')">😏 Старый прикол</button>
</div>

<script>
function go(page) {
    document.body.style.opacity = "0";
    setTimeout(() => {
        window.location.href = page;
    }, 300);
}
</script>

</body>
</html>
