<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Юбилей ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

textarea {
    width: 300px;
    height: 120px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    font-size: 16px;
    resize: none;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* сообщение после отправки */
#thanks {
    display: none;
    margin-top: 20px;
    font-size: 22px;
    animation: fade 0.5s ease;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<h1>Что ты хочешь на юбилей? 🎁❤️</h1>

<form id="form" action="https://formspree.io/f/mjgjwvaz" method="POST">
    <textarea name="message" placeholder="Напиши здесь..."></textarea>
    <br>
    <button type="submit">Отправить 💌</button>
</form>

<div id="thanks">Я уже запомнил 😏❤️</div>

<script>
const form = document.getElementById('form');

form.addEventListener('submit', function(e) {
    e.preventDefault();

    fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: {
            'Accept': 'application/json'
        }
    }).then(() => {
        form.style.display = 'none';
        document.getElementById('thanks').style.display = 'block';
    });
});
</script>

</body>
</html>
